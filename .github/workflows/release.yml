name: Release

# Build cross-platform desktop installers (Windows / macOS / Linux) and attach them to a draft
# GitHub Release. Triggered by pushing a version tag (e.g. v0.1.0) or run manually.
# Prereq: app icons under src-tauri/icons/ must be committed (see DESKTOP.md).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization is DISABLED — the APPLE_* env keys are intentionally
          # NOT set here, so the macOS bundle builds UNSIGNED.
          #
          # Why removed (not just emptied): tauri-action@v0 is a mutable tag. At v0.1.0 a
          # present-but-empty APPLE_CERTIFICATE was skipped (unsigned build). A later @v0 update
          # changed that: a present key -- even empty -- triggers `security import`, which crashes
          # the macOS job (`failed to import keychain certificate`) when the cert is empty/invalid.
          # An empty VALUE is not enough; the KEY must be absent, so we omit them entirely.
          #
          # To enable signing later: acquire the cert (see SIGNING.md), add the APPLE_* secrets,
          # re-add these env lines, AND pin tauri-action to a known-good SHA (mutable @v0 caused
          # this regression -- see TODOS "Pin third-party CI actions in release.yml").
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CoreBrimTech OS ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
