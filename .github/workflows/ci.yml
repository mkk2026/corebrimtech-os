name: CI

# Typecheck + tests on every push to main and every PR. Keeps main green.
# (Cross-platform desktop installers are built separately by release.yml on version tags.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      # Lint is advisory for now — the repo carries pre-existing lint debt that shouldn't block PRs.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true
